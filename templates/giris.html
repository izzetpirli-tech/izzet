<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elfiga ERP — Giriş</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --accent: #e94560;
            --card-bg: #16213e;
            --input-bg: #0f3460;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--primary);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(ellipse at 20% 50%, #0f346033 0%, transparent 60%),
                              radial-gradient(ellipse at 80% 20%, #e9456015 0%, transparent 50%);
        }
        .login-card {
            background: var(--card-bg);
            border: 1px solid #ffffff15;
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 40px 80px #00000060;
        }
        .logo {
            text-align: center;
            margin-bottom: 36px;
        }
        .logo-icon {
            width: 64px;
            height: 64px;
            background: var(--accent);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 12px;
        }
        .logo h1 {
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .logo p {
            color: #ffffff60;
            font-size: 13px;
            margin-top: 4px;
        }
        .form-label {
            color: #ffffff80;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .form-control {
            background: var(--input-bg);
            border: 1px solid #ffffff15;
            color: #fff;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 15px;
            transition: all 0.2s;
        }
        .form-control:focus {
            background: var(--input-bg);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 0 0 3px #e9456025;
        }
        .form-control::placeholder { color: #ffffff30; }
        .btn-giris {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-size: 15px;
            font-weight: 600;
            width: 100%;
            margin-top: 8px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn-giris:hover {
            background: #c73652;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px #e9456040;
        }
        .btn-giris:active { transform: translateY(0); }
        .hata {
            background: #e9456020;
            border: 1px solid #e9456040;
            border-radius: 10px;
            color: #ff7096;
            padding: 12px 16px;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
        }
        .mb-form { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon">🥟</div>
            <h1>Elfiga ERP</h1>
            <p>Üretim Yönetim Sistemi</p>
        </div>

        {% if hata %}
        <div class="hata">⚠️ {{ hata }}</div>
        {% endif %}

        <form method="post" action="/giris">
            <div class="mb-form">
                <label class="form-label">Kullanıcı Adı</label>
                <input type="text" name="username" class="form-control" placeholder="kullanici_adi" required autofocus>
            </div>
            <div class="mb-form">
                <label class="form-label">Şifre</label>
                <input type="password" name="sifre" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-giris">Giriş Yap →</button>
        </form>
    </div>
</body>
</html>
